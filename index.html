<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    <a-scene>
      <a-assets>
        <a-asset-item id="myAsteroid" src="asteroid.glb"></a-asset-item>
      </a-assets>

      <a-camera id="userCamera" position="0 1.6 0" look-controls>
        <a-ring color="#333" radius-inner="0.5" radius-outer="0.8" position="0 0 -1" opacity="0.5"></a-ring>
        <a-text value="O2: 98%" color="cyan" position="-0.4 0.3 -1" width="2"></a-text>
        <a-text value="AI ASSISTANT: ON" color="#00FF00" position="-0.4 -0.3 -1" width="1.5"></a-text>
      </a-camera>

      <a-entity id="spaceDebris" 
                gltf-model="#myAsteroid" 
                position="2 1.6 -15" 
                scale="0.01 0.01 0.01"
                animation="property: position; to: 0 1.6 0; dur: 15000; easing: linear">
      </a-entity>

      </a-scene>

    <script>
      const cameraEntity = document.querySelector('#userCamera');
      const debrisEntity = document.querySelector('#spaceDebris');
      let hasWarned = false;

      // Έλεγχος απόστασης
      setInterval(() => {
        if (!debrisEntity) return;

        const cameraPos = cameraEntity.object3D.position;
        const debrisPos = debrisEntity.object3D.position;
        const distance = cameraPos.distanceTo(debrisPos);

        // Η AI μιλάει όταν η απόσταση είναι κάτω από 4 μέτρα
        if (distance < 4 && !hasWarned) {
          hasWarned = true; 

          const msg = new SpeechSynthesisUtterance(
            "Warning! Collision imminent. Debris detected in safe zone. Move three meters to the left."
          );
          
          msg.lang = 'en-US';
          msg.pitch = 0.8;
          msg.rate = 1.0;

          window.speechSynthesis.speak(msg);
        }
      }, 100);
    </script>
  </body>
</html>

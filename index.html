<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
      /* Full-screen mission start overlay shown before the EVA simulation begins. */
      #overlay {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: radial-gradient(circle, #1b2735 0%, #090a0f 100%);
        display: flex; flex-direction: column;
        justify-content: center; align-items: center;
        z-index: 9999; color: cyan; font-family: 'Courier New', monospace;
      }
      #startBtn {
        padding: 15px 30px; background: none; border: 2px solid cyan;
        color: cyan; cursor: pointer; font-size: 20px; margin-top: 20px;
        transition: 0.3s; border-radius: 5px;
      }
      #startBtn:hover { background: cyan; color: black; }
    </style>
    
    <script>
      // Stores the browser voice used by Alice and the speech recognition object.
      let selectedFemaleVoice = null;
      let recognition = null;

      // Selects an English voice for Alice using the browser's speech synthesis voices.
      function loadVoices() {
        const voices = window.speechSynthesis.getVoices();
        selectedFemaleVoice = voices.find(voice => 
          voice.lang.includes('en') && 
          (voice.name.includes('Zira') || 
           voice.name.includes('Hazel') || 
           voice.name.includes('Natural') || 
           voice.name.includes('Google US English'))
        );

        if (!selectedFemaleVoice) {
          selectedFemaleVoice = voices.find(voice => 
            voice.lang.includes('en') && voice.name.toLowerCase().includes('female')
          );
        }
        if (!selectedFemaleVoice) {
          selectedFemaleVoice = voices.find(voice => voice.lang.includes('en'));
        }
      }

      if (typeof speechSynthesis !== 'undefined' && speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = loadVoices;
      }

      // Checks the distance between the astronaut camera and the approaching debris.
      // When the debris enters the unsafe zone, the HUD warning and Alice's voice alert are triggered.
      AFRAME.registerComponent('proximity-alert', {
        tick: function () {
          const el = this.el;
          const camera = document.querySelector('#userCamera');
          if (!camera || !window.missionStarted) return;

          const cameraPos = new THREE.Vector3();
          const debrisPos = new THREE.Vector3();
          camera.object3D.getWorldPosition(cameraPos);
          el.object3D.getWorldPosition(debrisPos);

          const distance = cameraPos.distanceTo(debrisPos);

          if (distance < 34 && !this.hasWarned) {
            this.hasWarned = true; 
            updateHUDLog("ALERT: COLLISION RISK");
            showHUDWarning(true); 
            speakText("Warning! Collision risk detected. Debris approaching safe zone. Modify path three meters to the left.");
          }
        }
      });

      // Creates a simple starfield so the PoC looks like an EVA space environment.
      // This is visual context only and not part of the safety logic.
      AFRAME.registerComponent('starfield-generator', {
        init: function () {
          const sceneEl = this.el;
          const starCount = 500; 

          for (let i = 0; i < starCount; i++) {
            const star = document.createElement('a-sphere');
            
            const u = Math.random();
            const v = Math.random();
            const theta = u * 2.0 * Math.PI;
            const phi = Math.acos(2.0 * v - 1.0);
            const r = 80 + Math.random() * 20; 
            
            const x = r * Math.sin(phi) * Math.cos(theta);
            const y = r * Math.sin(phi) * Math.sin(theta);
            const z = r * Math.cos(phi);

            const size = 0.05 + Math.random() * 0.12;
            const opacity = 0.4 + Math.random() * 0.6;

            star.setAttribute('position', `${x} ${y} ${z}`);
            star.setAttribute('radius', size);
            star.setAttribute('color', '#ffffff');
            star.setAttribute('opacity', opacity);
            star.setAttribute('shader', 'flat'); 

            sceneEl.appendChild(star);
          }
        }
      });

      // Makes Alice speak a message through the browser.
      // This represents the voice-based assistant support discussed in the thesis.
      function speakText(text, callback) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        if (selectedFemaleVoice) {
          msg.voice = selectedFemaleVoice;
        }
        msg.lang = 'en-US';
        msg.pitch = 1.05; 
        msg.rate = 0.85;  

        if (callback) {
          msg.onend = callback;
        }
        window.speechSynthesis.speak(msg);
      }

      // Starts voice recognition so the astronaut can ask Alice to scan for threats (not fully implemented).
      // In this PoC, the recognized commands are simple and browser-based.
      function initVoiceRecognition() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) return;

        recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = false;
        recognition.lang = 'en-US';

        recognition.onresult = function(event) {
          const speechToText = event.results[event.results.length - 1][0].transcript.toLowerCase();
          if (speechToText.includes("alice")) {
            if (speechToText.includes("scan") || speechToText.includes("threat") || speechToText.includes("danger")) {
              recognition.stop(); 
              updateHUDLog("ALICE: SCANNING...");
              speakText("Scanning for threats. Please hold.", function() {
                executeRadarScan();
              });
            }
          }
        };

        recognition.onend = function() {
          if (window.missionStarted) recognition.start();
        };

        recognition.start();
      }

      // Performs a simplified radar scan by checking the debris distance from the user.
      // It uses simulated scene data, not real spacesuit sensors or a validated AI model.
      function executeRadarScan() {
        const debris = document.querySelector('#spaceDebris');
        const camera = document.querySelector('#userCamera');
        if (!debris || !camera) return;

        const cameraPos = new THREE.Vector3();
        const debrisPos = new THREE.Vector3();
        camera.object3D.getWorldPosition(cameraPos);
        debris.object3D.getWorldPosition(debrisPos);

        const distance = cameraPos.distanceTo(debrisPos);

        if (distance > 34) {
          updateHUDLog("ALICE: TELEMETRY CLEAN");
          showHUDWarning(false); 
          speakText("Scan complete. Debris tracking telemetry is clean. No immediate dangers detected.", () => recognition.start());
        } else {
          updateHUDLog("ALERT: SECTOR RISK");
          showHUDWarning(true); 
          speakText("Warning. Localized sector collision risk. Alter trajectory three meters left.", () => recognition.start());
        }
      }

      // Shows or hides the red HUD warning sign when a threat is detected.
      function showHUDWarning(visible) {
        const warningSign = document.querySelector('#hudWarningSign');
        if (warningSign) {
          warningSign.setAttribute('visible', visible);
        }
      }

      // Updates the AI assistant status text on the lower-right HUD panel.
      function updateHUDLog(statusString) {
        const textEntity = document.querySelector('#aliceStatusText');
        if (textEntity) {
          textEntity.setAttribute('value', statusString);
        }
      }

      // Starts the EVA mission manually, keeping the human user in control of the simulation start.
      function startMission() {
        loadVoices();
        window.missionStarted = true;
        document.getElementById('overlay').style.display = 'none';
        
        speakText("Alice online. All systems activated.");
        initVoiceRecognition();
      }
    </script>
  </head>
  <body style="margin: 0; overflow: hidden;">

    <!-- Mission start screen. The user manually starts the EVA scenario. -->
    <div id="overlay">
      <h1>SYSTEM INITIALIZING...</h1>
      <button id="startBtn" onclick="startMission()">START EVA MISSION</button>
    </div>

    <!-- Main A-Frame scene used for the VR / 3D EVA Proof of Concept. -->
    <a-scene loading-screen="enabled: false" starfield-generator webxr="referenceSpaceType: local">
      <a-assets>
        <a-asset-item id="myAsteroid" src="asteroid.glb"></a-asset-item>
      </a-assets>

      <a-entity id="cameraRig">
        <a-camera id="userCamera" position="0 1.6 0" look-controls>
          
          <!-- HUD container attached to the camera so telemetry follows the astronaut's view. -->
          <a-entity id="hudMasterContainer" scale="0.6 0.6 0.6" position="0 0 0">
            
            <!-- Simulated EVA systems panel: suit values that would normally come from spacesuit sensors. -->
            <a-entity position="-0.55 0.35 -1.2" scale="0.9 0.9 0.9">
              <a-text value="EVA SYSTEMS" color="cyan" width="1.2" position="0 0.1 0"></a-text>
              
              <a-text value="O2 LVL" color="white" width="0.9" position="0 0.05 0"></a-text>
              <a-plane color="cyan" width="0.2" height="0.008" position="0.15 0.05 0" opacity="0.8"></a-plane>
              
              <a-text value="SUIT P." color="white" width="0.9" position="0 0.01 0"></a-text>
              <a-text value="4.3 PSI" color="cyan" width="1" position="0.15 0.01 0"></a-text>
              
              <a-text value="CO2 PP" color="white" width="0.9" position="0 -0.03 0"></a-text>
              <a-text value="NOMINAL" color="green" width="1" position="0.15 -0.03 0"></a-text>

              <a-text value="BATT" color="white" width="0.9" position="0 -0.07 0"></a-text>
              <a-plane color="cyan" width="0.2" height="0.008" position="0.15 -0.07 0" opacity="0.8"></a-plane>
            </a-entity>

            <!-- Simulated biometrics panel: simplified astronaut health values. -->
            <a-entity position="0.38 0.35 -1.2" scale="0.9 0.9 0.9">
              <a-text value="BIOMETRICS" color="cyan" width="1.2" position="0 0.1 0"></a-text>
              
              <a-text value="HR" color="white" width="0.9" position="0 0.05 0"></a-text>
              <a-text value="100 BPM" color="white" width="1.2" position="0.1 0.05 0"
                      animation="property: opacity; from: 1; to: 0.3; dur: 800; dir: alternate; loop: true">
              </a-text>
              
              <a-text value="CORE TMP" color="white" width="0.9" position="0 0.01 0"></a-text>
              <a-text value="37.2 C" color="cyan" width="1" position="0.21 0.01 0"></a-text>
            </a-entity>

            <!-- Red warning indicator that appears when the PoC detects a collision risk. -->
            <a-text id="hudWarningSign" 
                    value="[ WARNING ]" 
                    color="red" 
                    width="1.5" 
                    position="0.38 0.52 -1.2" 
                    visible="false"
                    animation="property: opacity; from: 1; to: 0.1; dur: 300; dir: alternate; loop: true">
            </a-text>

            <!-- AI assistant panel showing Alice's current status and communication link. -->
            <a-entity position="0.32 -0.38 -1.2" scale="0.8 0.8 0.8">
              <a-text value="AI ASSISTANT" color="cyan" width="1.2" position="0 0.04 0"></a-text>
              <a-text id="aliceStatusText" value="RADAR LOG: ACTIVE" color="white" width="0.9" position="0 0 0" opacity="0.8"></a-text>
              <a-text value="COMMS LINK: STABLE" color="white" width="0.9" position="0 -0.04 0" opacity="0.6"></a-text>
            </a-entity>

          </a-entity>

        </a-camera>
        
        <a-entity laser-controls="hand: left"></a-entity>
        <a-entity laser-controls="hand: right"></a-entity>
      </a-entity>

      <!-- Simulated space debris object. Its movement creates the collision-risk scenario. -->
      <a-entity id="spaceDebris" 
                gltf-model="#myAsteroid" 
                proximity-alert
                position="4 1.6 -40" 
                scale="0.01 0.01 0.01"
                animation="property: position; to: 0 1.6 0; dur: 35000; easing: linear; startEvents: loaded">
      </a-entity>

      <a-sky color="#000000"></a-sky> 
    </a-scene>
  </body>
</html>

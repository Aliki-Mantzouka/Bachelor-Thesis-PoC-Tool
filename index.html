<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
      #overlay {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: radial-gradient(circle, #1b2735 0%, #090a0f 100%);
        display: flex; flex-direction: column;
        justify-content: center; align-items: center;
        z-index: 9999; color: cyan; font-family: 'Courier New', monospace;
      }
      #startBtn {
        padding: 15px 30px; background: none; border: 2px solid cyan;
        color: cyan; cursor: pointer; font-size: 20px; margin-top: 20px;
        transition: 0.3s; border-radius: 5px;
      }
      #startBtn:hover { background: cyan; color: black; }
    </style>
    
    <script>
      AFRAME.registerComponent('proximity-alert', {
        tick: function () {
          const el = this.el;
          const camera = document.querySelector('#userCamera');
          if (!camera || !window.missionStarted) return;

          const cameraPos = new THREE.Vector3();
          const debrisPos = new THREE.Vector3();
          camera.object3D.getWorldPosition(cameraPos);
          el.object3D.getWorldPosition(debrisPos);

          const distance = cameraPos.distanceTo(debrisPos);

          if (distance < 6 && !this.hasWarned) {
            this.hasWarned = true; 
            this.speak();
          }
        },
        speak: function() {
          window.speechSynthesis.cancel();
          const msg = new SpeechSynthesisUtterance("Warning! Collision imminent. Debris detected in safe zone. Move three meters to the left.");
          msg.lang = 'en-US';
          msg.pitch = 0.8;
          window.speechSynthesis.speak(msg);
        }
      });

      function startMission() {
        window.missionStarted = true;
        document.getElementById('overlay').style.display = 'none';
        const welcome = new SpeechSynthesisUtterance("AI Assistant Online. EVA Systems initialized. Telemetry stable.");
        welcome.lang = 'en-US';
        window.speechSynthesis.speak(welcome);
      }
    </script>
  </head>
  <body style="margin: 0; overflow: hidden;">

    <div id="overlay">
      <h1>SYSTEM INITIALIZING...</h1>
      <button id="startBtn" onclick="startMission()">START EVA MISSION</button>
    </div>

    <a-scene loading-screen="enabled: false">
      <a-assets>
        <a-asset-item id="myAsteroid" src="asteroid.glb"></a-asset-item>
      </a-assets>

      <a-camera id="userCamera" position="0 1.6 0" look-controls>
        
        <a-entity position="-0.5 0.3 -0.8" scale="0.8 0.8 0.8">
          <a-text value="EVA SYSTEMS" color="cyan" width="1.2" position="0 0.1 0"></a-text>
          
          <a-text value="O2 LVL" color="white" width="0.9" position="0 0.05 0"></a-text>
          <a-plane color="cyan" width="0.2" height="0.008" position="0.15 0.05 0" opacity="0.8"></a-plane>
          
          <a-text value="SUIT P." color="white" width="0.9" position="0 0.01 0"></a-text>
          <a-text value="4.3 PSI" color="cyan" width="1" position="0.15 0.01 0"></a-text>
          
          <a-text value="CO2" color="white" width="0.9" position="0 -0.03 0"></a-text>
          <a-plane color="cyan" width="0.05" height="0.008" position="0.07 -0.03 0" opacity="0.5"></a-plane>
        </a-entity>

        <a-entity position="0.35 0.3 -0.8" scale="0.8 0.8 0.8">
          <a-text value="BIOMETRICS" color="cyan" width="1.2" position="0 0.1 0"></a-text>
          
          <a-text value="HR" color="white" width="0.9" position="0 0.05 0"></a-text>
          <a-text value="72 BPM" color="white" width="1.2" position="0.1 0.05 0"
                  animation="property: opacity; from: 1; to: 0.3; dur: 800; dir: alternate; loop: true">
          </a-text>

          <a-text value="BATT" color="white" width="0.9" position="0 0.01 0"></a-text>
          <a-plane color="cyan" width="0.2" height="0.008" position="0.15 0.01 0" opacity="0.8"></a-plane>
        </a-entity>

        <a-entity position="0.3 -0.35 -0.8" scale="0.7 0.7 0.7">
          <a-text value="AI ASSISTANT" color="cyan" width="1.2" position="0 0.04 0"></a-text>
          <a-text value="SCANNING SECTOR 4-B..." color="white" width="0.9" position="0 0 0" opacity="0.8"></a-text>
          <a-text value="VELOCITY: 12.4 km/s" color="white" width="0.9" position="0 -0.04 0" opacity="0.6"></a-text>
        </a-entity>

      </a-camera>

      <a-entity id="spaceDebris" 
                gltf-model="#myAsteroid" 
                proximity-alert
                position="2 1.6 -15" 
                scale="0.01 0.01 0.01"
                animation="property: position; to: 0 1.6 0; dur: 15000; easing: linear; startEvents: loaded">
      </a-entity>

      <a-sky color="#000000"></a-sky> 
    </a-scene>
  </body>
</html>

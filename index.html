<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
      #overlay {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: radial-gradient(circle, #1b2735 0%, #090a0f 100%);
        display: flex; flex-direction: column;
        justify-content: center; align-items: center;
        z-index: 9999; color: cyan; font-family: 'Courier New', monospace;
      }
      #startBtn {
        padding: 15px 30px; background: none; border: 2px solid cyan;
        color: cyan; cursor: pointer; font-size: 20px; margin-top: 20px;
        transition: 0.3s; border-radius: 5px;
      }
      #startBtn:hover { background: cyan; color: black; }
    </style>
    
    <script>
      AFRAME.registerComponent('proximity-alert', {
        tick: function () {
          const el = this.el;
          const camera = document.querySelector('#userCamera');
          if (!camera || !window.missionStarted) return;

          const cameraPos = new THREE.Vector3();
          const debrisPos = new THREE.Vector3();
          camera.object3D.getWorldPosition(cameraPos);
          el.object3D.getWorldPosition(debrisPos);

          const distance = cameraPos.distanceTo(debrisPos);

          if (distance < 6 && !this.hasWarned) {
            this.hasWarned = true; 
            this.speak();
          }
        },
        speak: function() {
          window.speechSynthesis.cancel();
          const msg = new SpeechSynthesisUtterance("Warning! Collision imminent. Debris detected in safe zone. Move three meters to the left.");
          msg.lang = 'en-US';
          msg.pitch = 0.8;
          window.speechSynthesis.speak(msg);
        }
      });

      function startMission() {
        window.missionStarted = true;
        document.getElementById('overlay').style.display = 'none';
        const welcome = new SpeechSynthesisUtterance("AI Assistant Online. Telemetry active.");
        welcome.lang = 'en-US';
        window.speechSynthesis.speak(welcome);
      }
    </script>
  </head>
  <body style="margin: 0; overflow: hidden;">

    <div id="overlay">
      <h1>SYSTEM INITIALIZING...</h1>
      <button id="startBtn" onclick="startMission()">START EVA MISSION</button>
    </div>

    <a-scene loading-screen="enabled: false">
      <a-assets>
        <a-asset-item id="myAsteroid" src="asteroid.glb"></a-asset-item>
      </a-assets>

      <a-camera id="userCamera" position="0 1.6 0" look-controls>
        
        <a-entity position="-0.6 0.4 -1">
          <a-text value="LIFE SUPPORT" color="cyan" width="1.5" position="0 0.1 0"></a-text>
          
          <a-text value="O2" color="white" width="1.2" position="0 0.04 0"></a-text>
          <a-plane color="#333" width="0.4" height="0.02" position="0.25 0.04 -0.001"></a-plane>
          <a-plane color="cyan" width="0.38" height="0.015" position="0.24 0.04 0"></a-plane>
          <a-text value="98%" color="cyan" width="1.2" position="0.5 0.04 0"></a-text>

          <a-text value="CO2" color="white" width="1.2" position="0 -0.02 0"></a-text>
          <a-plane color="#333" width="0.4" height="0.02" position="0.25 -0.02 -0.001"></a-plane>
          <a-plane color="#00FF00" width="0.08" height="0.015" position="0.09 -0.02 0"></a-plane>
          <a-text value="SAFE" color="#00FF00" width="1" position="0.5 -0.02 0"></a-text>
        </a-entity>

        <a-entity position="0.4 -0.4 -1">
          <a-text value="AI ASSISTANT" color="#00FF00" width="1.5" position="0 0.03 0"></a-text>
          <a-text value="SCANNING SECTOR..." color="white" width="1.2" position="0 -0.03 0"></a-text>
        </a-entity>

      </a-camera>

      <a-entity id="spaceDebris" 
                gltf-model="#myAsteroid" 
                proximity-alert
                position="2 1.6 -15" 
                scale="0.01 0.01 0.01"
                animation="property: position; to: 0 1.6 0; dur: 15000; easing: linear; startEvents: loaded">
      </a-entity>

      <a-sky color="#000000"></a-sky> 
    </a-scene>
  </body>
</html>
